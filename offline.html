<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b4f86">
  <meta name="description" content="Programa psicoeducativo de autoexploración emocional">
  <title>Sanar desde Adentro · SMART APPS</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <a class="skip-link" href="#app">Saltar al contenido</a>
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" aria-label="Abrir menú">☰</button>
    <img class="brand-logo" src="./assets/images/smart-apps-logo.png" alt="SMART APPS">
    <div class="top-actions">
      <button id="fontBtn" class="icon-btn" aria-label="Cambiar tamaño de letra">A+</button>
      <button id="themeBtn" class="icon-btn" aria-label="Cambiar tema">◐</button>
    </div>
  </header>

  <aside id="sidebar" class="sidebar" aria-label="Navegación principal">
    <div class="side-head"><strong>Sanar desde Adentro</strong><button id="closeMenuBtn" class="icon-btn" aria-label="Cerrar menú">×</button></div>
    <nav id="nav">
      <button data-route="home">Inicio</button>
      <button data-route="assessment">Autoevaluación</button>
      <button data-route="results">Mis resultados</button>
      <button data-route="dashboard">Mi proceso</button>
      <button data-route="tools">Herramientas</button>
      <button data-route="library">Biblioteca</button>
      <button data-route="settings">Configuración</button>
      <button data-route="help">Ayuda emocional</button>
    </nav>
  </aside>
  <div id="overlay" class="overlay"></div>

  <main id="app" tabindex="-1" aria-live="polite"></main>

  <footer class="footer">
    <p><strong>Creado por Lic. Agustín Flores C.</strong> · Desarrollado por SMART APPS.</p>
    <p>Programa psicoeducativo de autoexploración emocional · Adultos 18+</p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
